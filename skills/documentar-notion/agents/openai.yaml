name: documentar-notion
display_name: Documentar Notion
short_description: Crea o actualiza Notion con matriz previa, ejecucion conservadora y auditoria.
default_prompt: Usa $documentar-notion para documentar esta informacion en Notion. Si involucra actividades, observaciones, entregables, cronogramas o tableros, primero prepara una matriz/diff validable fuera de Notion; recien despues ejecuta en Notion con MCP/API, sin reemplazar ni eliminar nada sin confirmacion, y audita que coincida con la matriz aprobada.

